<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Plans&Pricing</title>

    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header-title">Our Pricing Plan</h1>
        <p class="header-text">We are an industry-leading company that values hoesty, integrity and efficiency, building quality products.</p>
      
      <!-- Per i buttons, ho viusto che con una formattazione particolare si può
        creare il toggle switch, ma è un po' articolata, ci torno dopo se ho tempo.
        Intanto li metto come checkbox semplice -->
        <div class="buttons">
            <span class="monthly">
                Monthly
                <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
                </label>
            </span>
            <span class="yearly">Yearly
                <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
                </label>
            </span>
        </div>
    </header>
    <main class="main">
        <div class="plan-title">
            <h2 class="plan-size"></h2>
            <p class="plan-popularity"></p>
        </div>
        <div class="pricing">
            <div class="price"></div>
            <div class="saving"></div>
        </div>
        <div class="button">
            <button class="choose-plan"></button>
        </div>
        <div class="features">
            <ul class="features-list">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
    </main>
</body>
</html>
